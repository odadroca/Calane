id: synthesis_weighted
name: SWOT with weighted synthesis
version: 0.1.0
description: SWOT strengths/weaknesses synthesized with the weighted variant.
providers:
  - id: mock
    type: mock
    model: mock-model-1
channels:
  - id: strengths
    executionMode: direct_provider
    prompt: prompts/swot/strengths.md
    outputSchema: schemas/swot.channel.schema.json
  - id: weaknesses
    executionMode: direct_provider
    prompt: prompts/swot/weaknesses.md
    outputSchema: schemas/swot.channel.schema.json
synthesis:
  id: synthesis
  variant: weighted
  executionMode: direct_provider
  prompt: prompts/synthesis/weighted.md
  outputSchema: schemas/synthesis/weighted.synthesis.schema.json
